          type: number
          example: 5000.00
        credit:
          type: number
          example: 0
        description:
          type:
            - string
            - "null"

    JournalEntry:
      type: object
      properties:
        id:
          type: string
          example: "je_01HZXK3YNPQ4JG8BVR0WT9MXCE"
        entryNumber:
          type:
            - string
            - "null"
          example: "JE-2026-0001"
        entryDate:
          type: string
          format: date
          description: Date of the journal entry.
          example: "2026-03-22"
        period:
          type:
            - string
            - "null"
          description: Accounting period (YYYY-MM).
          example: "2026-03"
        status:
          $ref: "#/components/schemas/JournalEntryStatus"
        source:
          type:
            - string
            - "null"
          enum: [extraction, manual, import, adjustment, opening_balance, closing_entry, bill, invoice, credit_note, depreciation]
        description:
          type:
            - string
            - "null"
        memo:
          type:
            - string
            - "null"
        documentType:
          type:
            - string
            - "null"
        documentNumber:
          type:
            - string
            - "null"
        vendorName:
          type:
            - string
            - "null"
        customerName:
          type:
            - string
            - "null"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/JournalEntryLine"
          description: Double-entry lines. Total debits must equal total credits.
        totalDebit:
          type: number
          description: Sum of all debit amounts.
          example: 5000.00
        totalCredit:
          type: number
          description: Sum of all credit amounts.
          example: 5000.00
        isBalanced:
          type: boolean
          description: Whether debits equal credits.
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateJournalEntryInput:
      type: object
      required: [entryDate, description, lines]
      properties:
        entryDate:
          type: string
          format: date
          description: Date of the journal entry (YYYY-MM-DD).
        description:
          type: string
          minLength: 1
          maxLength: 500
        lines:
          type: array
          minItems: 2
          description: At least 2 lines required for double-entry bookkeeping.
          items:
            type: object
            required: [accountId, debitAmount, creditAmount]
            properties:
              accountId:
                type: string
                minLength: 1
                description: ID of the account in the chart of accounts.
              debitAmount:
                type: number
                minimum: 0
                maximum: 999999999999.99
              creditAmount:
                type: number
                minimum: 0
                maximum: 999999999999.99
              description:
                type:
                  - string
                  - "null"
                maxLength: 500
              costCenter:
                type:
                  - string
                  - "null"
                maxLength: 100
              project:
                type:
                  - string
                  - "null"
                maxLength: 100
              department:
                type:
                  - string
                  - "null"
                maxLength: 100
        memo:
          type:
            - string
            - "null"
          maxLength: 2000
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: MYR
        documentType:
          type:
            - string
            - "null"
          maxLength: 100
        documentNumber:
          type:
            - string
            - "null"
          maxLength: 100
        documentDate:
          type:
            - string
            - "null"
          format: date
        vendorId:
          type:
            - string
            - "null"
        vendorName:
          type:
            - string
            - "null"
          maxLength: 300
        customerId:
          type:
            - string
            - "null"
        customerName:
          type:
            - string
            - "null"
          maxLength: 300
        source:
          type: string
          enum: [manual, adjustment, opening_balance, import]
          default: manual

