  # ── Accounts ────────────────────────────────────────────────────────────────

  /accounts:
    get:
      operationId: listAccounts
      summary: List chart of accounts
      description: |
        Returns a paginated list of accounts in the tenant's active chart of
        accounts. If no chart of accounts has been set up, an empty array is
        returned. Supports offset and cursor pagination, filtering, and field
        selection.
      tags: [Accounts]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Fields"
        - name: account_type
          in: query
          description: Filter by account type.
          schema:
            type: string
            enum:
              - asset
              - liability
              - equity
              - revenue
              - expense
              - contra_asset
              - contra_liability
              - contra_equity
              - contra_revenue
              - contra_expense
        - name: active_only
          in: query
          description: When `true`, only active accounts are returned.
          schema:
            type: string
            enum: ["true", "false"]
            default: "true"
      responses:
        "200":
          description: Paginated list of accounts.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Account"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
                      links:
                        $ref: "#/components/schemas/PaginationLinks"
              example:
                success: true
                data:
                  - id: "acc_01HZXK3YNPQ4JG8BVR0WT9MXCE"
                    accountCode: "1000"
                    accountName: "Cash and Cash Equivalents"
                    accountType: asset
                    normalBalance: debit
                    parentAccountId: null
                    path: "1000"
                    level: 0
                    isActive: true
                    isSystemAccount: true
                    isHeaderAccount: false
                    isCashAccount: true
                    isBankAccount: false
                    taxRelated: false
                    defaultTaxRate: null
                    taxCode: null
                    description: "Cash on hand and in bank accounts"
                    createdAt: "2026-01-01T00:00:00.000Z"
                    updatedAt: "2026-01-01T00:00:00.000Z"
                pagination:
                  page: 1
                  limit: 20
                  total: 85
                  totalPages: 5
                  hasMore: true
                links:
                  self: "https://app.cynco.io/api/v1/accounts?page=1&limit=20"
                  first: "https://app.cynco.io/api/v1/accounts?page=1&limit=20"
                  next: "https://app.cynco.io/api/v1/accounts?page=2&limit=20"
                  prev: null
                  last: "https://app.cynco.io/api/v1/accounts?page=5&limit=20"
                meta:
                  requestId: "req_01HZXK6YNPQ4JG8BVR0WT9MXCE"
                  apiVersion: v1
                  timestamp: "2026-03-22T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ── Journal Entries ─────────────────────────────────────────────────────────

  /journal-entries:
    get:
      operationId: listJournalEntries
      summary: List journal entries
      description: |
        Returns a paginated list of journal entries. Supports filtering by
        period, status, source, and free-text search.
      tags: [Journal Entries]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Fields"
        - name: period
          in: query
          description: Filter by accounting period (YYYY-MM).
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          example: "2026-03"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/JournalEntryStatus"
        - name: source
          in: query
          description: Filter by journal entry source.
          schema:
            type: string
            enum: [extraction, manual, import, adjustment, opening_balance, closing_entry, bill, invoice, credit_note, depreciation]
        - name: search
          in: query
          description: Free-text search across entry number, description, and memo.
          schema:
            type: string
            maxLength: 200
        - name: sort
          in: query
          schema:
            type: string
            enum: [entryNumber, entryDate, totalDebit, totalCredit, status]
            default: entryDate
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated list of journal entries.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/JournalEntry"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
                      links:
                        $ref: "#/components/schemas/PaginationLinks"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

    post:
      operationId: createJournalEntry
      summary: Create a journal entry
      description: |
        Create a new double-entry journal entry. The entry must have at least
        two lines, and total debits must equal total credits (within a tolerance
        of 0.01).
      tags: [Journal Entries]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJournalEntryInput"
            example:
              entryDate: "2026-03-22"
              description: "Office rent — March 2026"
              currency: MYR
              source: manual
              lines:
                - accountId: "acc_rent_expense"
                  debitAmount: 5000.00
                  creditAmount: 0
                  description: "Rent expense"
                - accountId: "acc_bank"
                  debitAmount: 0
                  creditAmount: 5000.00
                  description: "Bank payment"
      responses:
        "201":
          description: Journal entry created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/JournalEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /journal-entries/{id}:
    get:
      operationId: getJournalEntry
      summary: Get a journal entry
      description: Retrieve a single journal entry by ID, including all lines.
      tags: [Journal Entries]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Journal entry found.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/JournalEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /journal-entries/batch:
    post:
      operationId: batchJournalEntries
      summary: Batch create journal entries
      description: Create multiple journal entries in a single request.
      tags: [Journal Entries]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
      responses:
        "200":
          description: Batch result.
          content:
            application/json:
              schema:
