  # ── Bills ───────────────────────────────────────────────────────────────────

  /bills:
    get:
      operationId: listBills
      summary: List bills
      description: |
        Returns a paginated list of bills for the authenticated tenant.
        Supports filtering by status, vendor, date range, and free-text search.
      tags: [Bills]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Fields"
        - name: status
          in: query
          description: Filter by bill status. Use `all` for no filter.
          schema:
            type: string
            enum: [draft, in_review, pending_approval, approved, awaiting_payment, scheduled, paid, rejected, void, all]
            default: all
        - name: vendorId
          in: query
          description: Filter by vendor ID.
          schema:
            type: string
        - name: startDate
          in: query
          description: Filter bills issued on or after this date (YYYY-MM-DD).
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Filter bills issued on or before this date (YYYY-MM-DD).
          schema:
            type: string
            format: date
        - name: search
          in: query
          description: Free-text search across bill number, reference, vendor name, and memo.
          schema:
            type: string
            maxLength: 200
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, due_date, total_amount, bill_number]
            default: created_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated list of bills.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Bill"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
                      links:
                        $ref: "#/components/schemas/PaginationLinks"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /bills/{id}:
    get:
      operationId: getBill
      summary: Get a bill
      description: Retrieve a single bill by ID.
      tags: [Bills]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Bill found.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Bill"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

    patch:
      operationId: updateBill
      summary: Update a bill
      description: |
        Update fields on an existing bill. Supports updating metadata fields
        like vendor, dates, status, and memo.
      tags: [Bills]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBillInput"
            example:
              status: approved
              memo: "Approved by finance team"
      responses:
        "200":
          description: Bill updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Bill"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

