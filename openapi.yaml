          example: "1000"
        accountName:
          type: string
          example: "Cash and Cash Equivalents"
        accountType:
          type: string
          enum: [asset, liability, equity, revenue, expense, contra_asset, contra_liability, contra_equity, contra_revenue, contra_expense]
        normalBalance:
          type:
            - string
            - "null"
          enum: [debit, credit]
        parentAccountId:
          type:
            - string
            - "null"
          description: ID of the parent account (for hierarchical COA).
        path:
          type:
            - string
            - "null"
          description: Hierarchical path in the chart of accounts.
        level:
          type: integer
          description: Nesting depth (0 = top-level).
          example: 0
        isActive:
          type: boolean
          default: true
        isSystemAccount:
          type: boolean
          description: Whether this account is system-generated and cannot be deleted.
          default: false
        isHeaderAccount:
          type: boolean
          description: Header accounts group sub-accounts and cannot hold transactions.
          default: false
