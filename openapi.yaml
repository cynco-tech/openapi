openapi: 3.1.0
info:
  title: Cynco API
  version: 1.0.0
  summary: AI-native business platform API for accounting, invoicing, and operations.
  description: |
    The Cynco REST API provides programmatic access to your business data — invoices,
    customers, vendors, bills, journal entries, chart of accounts, bank accounts,
    bank transactions, and financial reports.

    ## Authentication

    All requests require a Bearer token in the `Authorization` header. API keys are
    created in the Cynco dashboard under **Settings > API Keys** and carry a `cak_`
    prefix.

    ```
    Authorization: Bearer cak_live_abc123...
    ```

    Each key is scoped to a specific tenant and carries permission scopes that limit
    which endpoints it can access.

    ## Base URL

    ```
    https://app.cynco.io/api/v1/
    ```

    ## Pagination

    List endpoints support two pagination modes:

    **Offset pagination** (default) — use `page` and `limit` query parameters.
    The response includes a `pagination` object with `page`, `limit`, `total`,
    `totalPages`, and `hasMore`.

    **Cursor pagination** — pass the `cursor` query parameter returned in the
    previous response's `pagination.nextCursor`. Cursor and offset modes are
    mutually exclusive; you cannot combine `cursor` with `page` > 1.

    ## Field Selection

    Pass `?fields=field1,field2` to receive only the specified fields on each
    resource. Unknown fields return a 422 error.

    ## Rate Limits

    | Tier    | Requests / minute |
    |---------|-------------------|
    | Default | 120               |
    | Read    | 200               |
    | Write   | 60                |

    Rate limit state is communicated via response headers:

    - `X-RateLimit-Limit` — maximum requests in the window
    - `X-RateLimit-Remaining` — remaining requests in the window
    - `X-RateLimit-Reset` — Unix timestamp when the window resets

    When the limit is exceeded the API responds with `429 Too Many Requests`.

    ## Idempotency

    Write operations (`POST`, `PATCH`, `DELETE`) accept an `Idempotency-Key`
    header. If a request with the same key has already been processed, the original
    response is replayed. Keys are scoped to the tenant and expire after 24 hours.

    ## ETag Caching

    GET responses include an `ETag` header. Send `If-None-Match` with the ETag
    value on subsequent requests to receive `304 Not Modified` when the resource
    has not changed.

    ## Webhooks

    Configure webhook endpoints in the Cynco dashboard. Events are delivered as
    POST requests with the following headers:

    - `X-Webhook-Id` — unique delivery ID
    - `X-Webhook-Timestamp` — Unix timestamp of the delivery
    - `X-Webhook-Signature` — HMAC-SHA256 signature of the request body using
      your webhook secret

    Verify signatures by computing `HMAC-SHA256(secret, timestamp + "." + body)`
    and comparing to the signature header.

    ### Webhook Events

    | Event                      | Trigger                   |
    |----------------------------|---------------------------|
    | `invoice.created`          | Invoice created           |
    | `invoice.updated`          | Invoice updated           |
    | `invoice.deleted`          | Invoice deleted           |
    | `customer.created`         | Customer created          |
    | `customer.updated`         | Customer updated          |
    | `customer.deleted`         | Customer deleted          |
    | `vendor.created`           | Vendor created            |
    | `vendor.updated`           | Vendor updated            |
    | `vendor.deleted`           | Vendor deleted            |
    | `bill.created`             | Bill created              |
    | `bill.updated`             | Bill updated              |
    | `bill.deleted`             | Bill deleted              |
    | `journal_entry.created`    | Journal entry created     |
    | `journal_entry.updated`    | Journal entry updated     |
    | `item.created`             | Item created              |
    | `item.updated`             | Item updated              |
    | `item.deleted`             | Item deleted              |

    ## Scopes

    API keys carry permission scopes that control which endpoints they can access.
    Each scope follows a `resource:action` pattern.

    | Scope                    | Grants access to                      |
    |--------------------------|---------------------------------------|
    | `invoices:read`          | List and get invoices                 |
    | `invoices:write`         | Create, update, and batch invoices    |
    | `customers:read`         | List and get customers                |
    | `customers:write`        | Create, update, delete customers      |
    | `vendors:read`           | List and get vendors                  |
    | `vendors:write`          | Create, update, delete vendors        |
    | `bills:read`             | List and get bills                    |
    | `bills:write`            | Update bills                          |
    | `items:read`             | List and get items                    |
    | `items:write`            | Update and delete items               |
    | `accounts:read`          | List and get accounts                 |
    | `journal_entries:read`   | List and get journal entries           |
    | `journal_entries:write`  | Create and batch journal entries       |
    | `bank_accounts:read`     | List and get bank accounts             |
    | `bank_transactions:read` | List and get bank transactions         |
    | `reports:read`           | Generate financial reports             |
    | `webhooks:read`          | List and get webhook endpoints         |
    | `webhooks:write`         | Create, update, and delete webhooks    |

    ## Error Handling

    All errors follow a consistent envelope:

    ```json
    {
      "success": false,
      "error": {
        "code": "VALIDATION_ERROR",
        "message": "Human-readable description",
        "details": [{ "field": "name", "message": "Required" }]
      },
      "meta": {
        "requestId": "req_abc123",
        "apiVersion": "v1",
        "timestamp": "2026-03-22T12:00:00.000Z"
      }
    }
    ```
  termsOfService: https://cynco.io/terms
  contact:
    name: Cynco API Support
    url: https://cynco.io/support
    email: support@cynco.io
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://app.cynco.io/api/v1
    description: Production
  - url: https://staging.cynco.io/api/v1
    description: Staging

security:
  - BearerAuth: []

tags:
  - name: Invoices
    description: Create, read, update, and batch-manage invoices.
  - name: Customers
    description: Create, read, update, delete, and batch-manage customers.
  - name: Vendors
    description: Create, read, update, delete, and batch-manage vendors.
  - name: Bills
    description: Read and update bills.
  - name: Items
    description: Read, update, and delete line-item catalog entries.
  - name: Accounts
    description: Read chart-of-accounts entries.
  - name: Journal Entries
    description: Create, read, and batch-manage journal entries.
  - name: Bank Accounts
    description: Read financial (bank) accounts.
  - name: Bank Transactions
    description: Read bank transactions.
  - name: Reports
    description: Generate trial balance, balance sheet, and profit & loss reports.
  - name: Webhooks
    description: Manage webhook endpoints for event notifications.

# ─── Paths ──────────────────────────────────────────────────────────────────

paths:

  # ── Invoices ────────────────────────────────────────────────────────────────

  /invoices:
    get:
      operationId: listInvoices
      summary: List invoices
      description: |
        Returns a paginated list of invoices for the authenticated tenant.
        Supports offset and cursor pagination, filtering, sorting, and field
        selection.
      tags: [Invoices]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Fields"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/InvoiceStatus"
        - name: created_from
          in: query
          description: Filter invoices created on or after this date (ISO 8601).
          schema:
            type: string
            format: date-time
        - name: created_to
          in: query
          description: Filter invoices created on or before this date (ISO 8601).
          schema:
            type: string
            format: date-time
        - name: due_from
          in: query
          description: Filter invoices due on or after this date (ISO 8601).
          schema:
            type: string
            format: date-time
        - name: due_to
          in: query
          description: Filter invoices due on or before this date (ISO 8601).
          schema:
            type: string
            format: date-time
        - name: min_amount
          in: query
          description: Minimum total amount filter.
          schema:
            type: number
            minimum: 0
        - name: max_amount
          in: query
          description: Maximum total amount filter.
          schema:
            type: number
            minimum: 0
        - name: search
          in: query
          description: Free-text search across invoice number, customer name, and memo.
          schema:
            type: string
            maxLength: 200
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, due_date, total]
            default: created_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated list of invoices.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Invoice"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
                      links:
                        $ref: "#/components/schemas/PaginationLinks"
              example:
                success: true
                data:
                  - id: "inv_01HZXK3YNPQ4JG8BVR0WT9MXCE"
                    invoiceNumber: "INV-2026-0042"
                    status: finalized
                    customerId: "cus_01HZXK3YNPQ4JG8BVR0WT9MXCE"
                    customerName: "Acme Corp Sdn Bhd"
                    customerEmail: "billing@acmecorp.my"
                    currency: MYR
                    lineItems:
                      - description: "Consulting services — March 2026"
                        quantity: 40
                        unitPrice: 250.00
                        amount: 10000.00
                    taxes: 600.00
                    totalAmount: 10600.00
                    paidAmount: 0
                    hasDeposit: false
                    depositAmount: 0
                    dueDate: "2026-04-15"
                    paymentTerms: "Net 30"
                    memo: null
                    source: normal
                    createdAt: "2026-03-15T08:30:00.000Z"
                    updatedAt: "2026-03-15T08:30:00.000Z"
                pagination:
                  page: 1
                  limit: 20
                  total: 142
                  totalPages: 8
                  hasMore: true
                links:
                  self: "https://app.cynco.io/api/v1/invoices?page=1&limit=20"
                  first: "https://app.cynco.io/api/v1/invoices?page=1&limit=20"
                  next: "https://app.cynco.io/api/v1/invoices?page=2&limit=20"
                  prev: null
                  last: "https://app.cynco.io/api/v1/invoices?page=8&limit=20"
                meta:
                  requestId: "req_01HZXK3YNPQ4JG8BVR0WT9MXCE"
                  apiVersion: v1
                  timestamp: "2026-03-22T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /invoices/{id}:
    get:
      operationId: getInvoice
      summary: Get an invoice
      description: Retrieve a single invoice by ID.
      tags: [Invoices]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Invoice found.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Invoice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

    patch:
      operationId: updateInvoice
      summary: Update an invoice
      description: |
        Update non-structural fields on an invoice. Currently limited to `memo`,
        `paymentTerms`, and `dueDate`. Full line-item editing is planned for a
        future release.
      tags: [Invoices]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceInput"
            example:
              memo: "Updated payment instructions"
              dueDate: "2026-05-01"
      responses:
        "200":
          description: Invoice updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Invoice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /invoices/batch:
    post:
      operationId: batchInvoices
      summary: Batch create invoices
      description: |
        Create multiple invoices in a single request. Each item in the array
        is processed independently; partial success is possible. The response
        contains results for each item in the same order.
      tags: [Invoices]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
      responses:
        "200":
          description: Batch result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ── Customers ───────────────────────────────────────────────────────────────

  /customers:
    get:
      operationId: listCustomers
      summary: List customers
      description: |
        Returns a paginated list of customers for the authenticated tenant.
        By default only active customers are returned; use `status=all` or
        `status=inactive` to change this.
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Fields"
        - name: status
          in: query
          description: Filter by active status.
          schema:
            type: string
            enum: [active, inactive, all]
            default: active
        - name: search
          in: query
          description: Free-text search across name, email, phone.
          schema:
            type: string
            maxLength: 200
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, email, created_at]
            default: created_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated list of customers.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Customer"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
                      links:
                        $ref: "#/components/schemas/PaginationLinks"
              example:
                success: true
                data:
                  - id: "cus_01HZXK3YNPQ4JG8BVR0WT9MXCE"
                    name: "Acme Corp Sdn Bhd"
                    email: "billing@acmecorp.my"
                    phone: "+60123456789"
                    address: "123 Jalan Ampang"
                    city: "Kuala Lumpur"
                    state: "Wilayah Persekutuan"
                    zip: "50450"
                    country: "MY"
                    registrationNumber: "202101012345"
                    taxId: null
                    website: "https://acmecorp.my"
                    paymentTerms: "Net 30"
                    preferredPaymentMethod: "bank_transfer"
                    preferredCurrency: "MYR"
                    creditLimit: 50000.00
                    category: "Enterprise"
                    notes: null
                    isActive: true
                    createdAt: "2026-01-10T03:00:00.000Z"
                    updatedAt: "2026-03-18T09:15:00.000Z"
                pagination:
                  page: 1
                  limit: 20
                  total: 35
                  totalPages: 2
                  hasMore: true
                meta:
                  requestId: "req_01HZXK4YNPQ4JG8BVR0WT9MXCE"
                  apiVersion: v1
                  timestamp: "2026-03-22T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

    post:
      operationId: createCustomer
      summary: Create a customer
      description: Create a new customer. Duplicate emails return a 409 Conflict.
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerInput"
            example:
              name: "Acme Corp Sdn Bhd"
              email: "billing@acmecorp.my"
              phone: "+60123456789"
              address: "123 Jalan Ampang"
              city: "Kuala Lumpur"
              state: "Wilayah Persekutuan"
              zip: "50450"
              country: "MY"
              paymentTerms: "Net 30"
      responses:
        "201":
          description: Customer created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /customers/{id}:
    get:
      operationId: getCustomer
      summary: Get a customer
      description: Retrieve a single customer by ID.
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Customer found.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

    patch:
      operationId: updateCustomer
      summary: Update a customer
      description: Update one or more fields on an existing customer. All fields are optional.
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerInput"
            example:
              phone: "+60198765432"
              creditLimit: "100000.00"
      responses:
        "200":
          description: Customer updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Customer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

    delete:
      operationId: deleteCustomer
      summary: Delete a customer
      description: |
        Permanently delete a customer. This action is irreversible. Customers
        with existing invoices cannot be deleted.
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Customer deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                          deleted:
                            type: boolean
                            const: true
              example:
                success: true
                data:
                  id: "cus_01HZXK3YNPQ4JG8BVR0WT9MXCE"
                  deleted: true
                meta:
                  requestId: "req_01HZXK5YNPQ4JG8BVR0WT9MXCE"
                  apiVersion: v1
                  timestamp: "2026-03-22T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /customers/batch:
    post:
      operationId: batchCustomers
      summary: Batch create customers
      description: |
        Create multiple customers in a single request. Each item is processed
        independently; partial success is possible.
      tags: [Customers]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
      responses:
        "200":
          description: Batch result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ── Vendors ─────────────────────────────────────────────────────────────────

  /vendors:
    get:
      operationId: listVendors
      summary: List vendors
      description: |
        Returns a paginated list of vendors for the authenticated tenant.
        By default only active vendors are returned.
      tags: [Vendors]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Fields"
        - name: status
          in: query
          description: Filter by active status.
          schema:
            type: string
            enum: [active, inactive, all]
            default: active
        - name: category
          in: query
          description: Filter by vendor category.
          schema:
            type: string
            maxLength: 100
        - name: search
          in: query
          description: Free-text search across name, email, phone.
          schema:
            type: string
            maxLength: 200
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, created_at, total_amount]
            default: created_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated list of vendors.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Vendor"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
                      links:
