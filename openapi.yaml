        openingBalanceDate:
          type:
            - string
            - "null"
          format: date
        lastStatementDate:
          type:
            - string
            - "null"
          format: date
        lastReconciledDate:
          type:
            - string
            - "null"
          format: date
        displayOrder:
          type: integer
          description: Sort order for display in the UI.
          example: 1
        notes:
          type:
            - string
            - "null"
        institution:
          type:
            - object
            - "null"
          description: Bank institution details.
          properties:
            id:
              type: string
            name:
              type: string
            swiftCode:
              type:
                - string
                - "null"
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Bank Transaction ──────────────────────────────────────────────────────

    BankTransaction:
      type: object
      properties:
        id:
          type: string
          example: "btx_01HZXK3YNPQ4JG8BVR0WT9MXCE"
        financialAccountId:
          type: string
          description: ID of the bank account this transaction belongs to.
        transactionDate:
          type:
            - string
            - "null"
          format: date
        valueDate:
          type:
            - string
            - "null"
          format: date
          description: Settlement/value date.
        rawDescription:
          type:
            - string
            - "null"
          description: Original bank description.
        cleanDescription:
          type:
            - string
            - "null"
          description: Cleaned/normalized description.
        reference:
          type:
            - string
            - "null"
          description: Bank reference number.
        transactionType:
          type: string
          enum: [credit, debit]
        amount:
          type: number
          description: Transaction amount (always positive; direction indicated by transactionType).
          example: 1500.00
        balanceAfter:
          type:
            - number
            - "null"
          description: Account balance after this transaction.
        category:
          type:
            - string
            - "null"
          description: Transaction category.
        payeeName:
          type:
            - string
            - "null"
        status:
          type:
            - string
            - "null"
          enum: [imported, categorized, posted, reconciled, excluded]
        matchStatus:
          type:
            - string
            - "null"
          enum: [unmatched, suggested, matched, reconciled, excluded]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Report Schemas ────────────────────────────────────────────────────────

    TrialBalance:
      type: object
      properties:
        period:
          type: string
          description: Accounting period.
          example: "2026-03"
        asOfDate:
          type: string
          format: date
          example: "2026-03-31"
        balanceType:
          type: string
          enum: [preliminary, adjusted, final]
        totalDebit:
          type: number
          example: 150000.00
        totalCredit:
          type: number
          example: 150000.00
        isBalanced:
          type: boolean
          example: true
        difference:
          type: number
          description: Difference between total debits and credits. Should be 0 if balanced.
          example: 0
        accountCount:
          type: integer
          description: Number of accounts with activity.
          example: 45
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/TrialBalanceLineItem"

    TrialBalanceLineItem:
      type: object
      properties:
        accountId:
          type: string
        accountCode:
          type: string
        accountName:
          type: string
        accountType:
          type: string
        normalBalance:
          type: string
          enum: [debit, credit]
        openingBalance:
          type: number
        periodDebit:
          type: number
        periodCredit:
          type: number
        closingBalance:
          type: number
        debitBalance:
          type: number
        creditBalance:
          type: number
        transactionCount:
          type: integer
          description: Number of transactions in this period.

    FinancialStatement:
      type: object
      description: |
        Balance sheet or profit & loss report. Contains grouped sections
        (e.g. assets, liabilities, revenue, expenses) with account-level
        detail.
      properties:
        period:
          type: string
          example: "2026-03"
        asOfDate:
          type: string
          format: date
        reportType:
          type: string
          enum: [balance_sheet, profit_loss]
        sections:
          type: array
          items:
            $ref: "#/components/schemas/StatementSection"
        totals:
          type: object
          additionalProperties:
            type: number
          description: Summary totals (e.g. totalAssets, totalLiabilities, netProfit).

    StatementSection:
      type: object
      properties:
        label:
          type: string
          description: Section heading.
          example: "Current Assets"
        total:
          type: number
          example: 250000.00
        accounts:
          type: array
          items:
            type: object
            properties:
              accountId:
                type: string
              accountCode:
                type: string
              accountName:
                type: string
              balance:
                type: number
        subsections:
          type:
            - array
            - "null"
          items:
            $ref: "#/components/schemas/StatementSection"

    # ── Webhook Schemas ──────────────────────────────────────────────────────

    WebhookEvent:
      type: string
      description: A webhook event type.
      enum:
        - invoice.created
        - invoice.updated
        - invoice.deleted
        - customer.created
        - customer.updated
        - customer.deleted
        - vendor.created
        - vendor.updated
        - vendor.deleted
        - bill.created
        - bill.updated
        - bill.deleted
        - journal_entry.created
        - journal_entry.updated
        - item.created
        - item.updated
        - item.deleted

    Webhook:
      type: object
      properties:
        id:
          type: string
          description: Unique webhook identifier.
          example: "whk_01HZXK3YNPQ4JG8BVR0WT9MXCE"
        url:
          type: string
          format: uri
          description: The URL that receives webhook POST requests.
          example: "https://example.com/webhooks/cynco"
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEvent"
          description: List of event types this webhook subscribes to.
        description:
          type:
            - string
            - "null"
          description: Optional human-readable label for this webhook.
          example: "Invoice notifications"
        isActive:
          type: boolean
          description: Whether the webhook is currently receiving events.
          default: true
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2026-03-15T08:30:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-15T08:30:00.000Z"

    CreateWebhookInput:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
          description: The URL that will receive webhook POST requests. Must use HTTPS.
          example: "https://example.com/webhooks/cynco"
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEvent"
          minItems: 1
          description: List of event types to subscribe to.
        description:
          type:
            - string
            - "null"
          description: Optional human-readable label for this webhook.
          maxLength: 500

    UpdateWebhookInput:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: New URL for the webhook endpoint. Must use HTTPS.
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEvent"
          minItems: 1
          description: Replace the list of subscribed event types.
        description:
          type:
            - string
            - "null"
          description: Updated human-readable label.
          maxLength: 500
        isActive:
          type: boolean
          description: Enable or disable the webhook.

